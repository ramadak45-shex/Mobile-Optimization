<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنی یاریزانان - تەکنیکی</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        #search { width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 16px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; width: 200px; border: 1px solid #333; }
        button { background: #007a3d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
        #info-box { margin: 20px auto; padding: 20px; background: #252525; border-radius: 10px; max-width: 700px; border-right: 5px solid #007a3d; display: none; font-size: 16px; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>ڕێکخستنی یاریزانانی کورد</h1>
    <input type="text" id="search" onkeyup="searchGame()" placeholder="گەڕان بەدوای ناوی یارییەک... (بۆ نموونە: PUBG)">
    <div id="info-box"></div>

    <div class="container" id="game-list">
        </div>

    <script>
        const games = [
            {name: "PUBG Mobile", guide: "گرافیک: Smooth، فریم: Extreme، Anti-aliasing: بکوژێنەوە."},
            {name: "Standoff 2", guide: "فریم: 60 FPS، Shader: Low، Texture: Low."},
            {name: "Free Fire", guide: "گرافیک: Smooth، High FPS: چالاک بکە."},
            {name: "Call of Duty", guide: "گرافیک: Low، فریم: Max، Depth of Field: بکوژێنەوە."},
            {name: "Minecraft", guide: "Render Distance: 8، Fancy Graphics: بکوژێنەوە."},
            {name: "Car Parking", guide: "Resolution: 70%، Shadows: بکوژێنەوە."},
            {name: "Asphalt 9", guide: "گرافیک: Performance، کەمکردنەوەی Effect."},
            {name: "eFootball", guide: "گرافیک: Low، Resolution: Standard."},
            {name: "Roblox", guide: "گرافیک: Manual، بەرزکردنەوەی Graphics بۆ 1."},
            {name: "Brawl Stars", guide: "High Frame Rate: چالاک بکە."},
            {name: "Clash of Clans", guide: "Visual Effects: کەمکردنەوە."},
            {name: "Subway Surfers", guide: "بێ کێشەیە تەنها Battery Saver بکوژێنەوە."},
            {name: "Shadow Fight 3", guide: "سێبەر (Shadows) بکوژێنەوە بۆ FPS."},
            {name: "Among Us", guide: "VSync: بکوژێنەوە."},
            {name: "FIFA Mobile", guide: "گرافیک: Medium، 60 FPS: چالاک بکە."},
            {name: "Genshin Impact", guide: "گرافیک: Low، فریم: 30 FPS."},
            {name: "Real Racing 3", guide: "بەستنەوەی گرافیک بۆ Low."},
            {name: "Critical Ops", guide: "گرافیک: Low، فریم: 60."},
            {name: "Apex Legends", guide: "گرافیک: Smooth، فریم: Ultra."},
            {name: "World of Tanks", guide: "گرافیک: Low، Grass: بکوژێنەوە."},
            {name: "Dead Trigger 2", guide: "گرافیک: Low، Shadows: بکوژێنەوە."},
            {name: "Modern Combat 5", guide: "گرافیک: Low، FPS: Max."},
            {name: "Need for Speed", guide: "Shadows: Off، Resolution: 80%."},
            {name: "Bullet Force", guide: "گرافیک: Low، VSync: Off."},
            {name: "Last Day on Earth", guide: "گرافیک: Low، کەمکردنەوەی Shader."},
            {name: "Terraria", guide: "Frame Skip: On."},
            {name: "Plants vs Zombies", guide: "هیچ ڕێکخستنی تایبەتی نییە."},
            {name: "Hill Climb 2", guide: "ئاساییە."},
            {name: "Sniper 3D", guide: "گرافیک: Low."},
            {name: "8 Ball Pool", guide: "گرافیک: Low."}
        ];

        function showGuide(text) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            box.innerText = text;
        }

        function searchGame() {
            let input = document.getElementById('search').value.toUpperCase();
            let container = document.getElementById('game-list');
            container.innerHTML = "";
            games.filter(g => g.name.toUpperCase().includes(input)).forEach(g => {
                container.innerHTML += `<div class='card'><h3>${g.name}</h3><button onclick="showGuide('${g.guide}')">بینینی ڕێکخستن</button></div>`;
            });
        }
        searchGame(); // بۆ نیشاندانی هەموو یارییەکان لە سەرەتاوە
    </script>
</body>
</html>
