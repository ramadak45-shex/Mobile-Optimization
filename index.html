<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنی یاریزانان</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 280px; border: 1px solid #333; }
        button { background: #007a3d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        #info-box { margin: 30px auto; padding: 20px; background: #252525; border-radius: 10px; max-width: 600px; border-right: 5px solid #007a3d; display: none; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>ڕێکخستنی مۆبایل بۆ یاریزانانی کورد</h1>
    <div id="info-box"></div>

    <div class="container">
        <div class="card">
            <h3>PUBG Mobile</h3>
            <button onclick="showGuide('بۆ پابجی: گرافیک بخە سەر Smooth، ڕێژەی فریم (FPS) بخە سەر Extreme. Anti-aliasing بکوژێنەوە بۆ کەمکردنەوەی فشار لەسەر پرۆسێسەر.')">بینینی ڕێکخستن</button>
        </div>

        <div class="card">
            <h3>Standoff 2</h3>
            <button onclick="showGuide('بۆ ستاند ئۆف 2: Target FPS بخە سەر 60، Shader Detail و Texture Quality بخە سەر Low. ڕێگە بدە مۆبایلەکە سارد بێتەوە.')">بینینی ڕێکخستن</button>
        </div>

        <div class="card">
            <h3>Free Fire</h3>
            <button onclick="showGuide('فری فایەر: گرافیک لەسەر Smooth، High FPS چالاک بکە.')">بینینی ڕێکخستن</button>
        </div>

        <div class="card">
            <h3>Minecraft</h3>
            <button onclick="showGuide('ماینکرافت: Render Distance کەم بکەرەوە بۆ 8، Fancy Graphics بکوژێنەوە.')">بینینی ڕێکخستن</button>
        </div>

        <div class="card">
            <h3>Car Parking</h3>
            <button onclick="showGuide('کار پارکینگ: Resolution بخە سەر 70%، Shadows بکوژێنەوە.')">بینینی ڕێکخستن</button>
        </div>
    </div>

    <script>
        function showGuide(text) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            box.innerText = text;
        }
    </script>
</body>
</html>
