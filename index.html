<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنی یاریزانان - RYZEN Optimization</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 250px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #007a3d; transform: scale(1.05); }
        button { background: #007a3d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>ڕێکخستنی مۆبایل بۆ یاریزانانی کورد</h1>
    <p>جۆری مۆبایلەکەت هەڵبژێرە بۆ بینینی باشترین ڕێکخستن:</p>

    <div class="container">
        <div class="card">
            <h3>iPhone 8 Plus</h3>
            <p>ڕێکخستنی تایبەت بۆ PUBG Mobile</p>
            <button onclick="alert('لێرە ڕێنماییەکانی iPhone 8 Plus دادەنێیت')">بینینی ڕێکخستن</button>
        </div>

        <div class="card">
            <h3>Android (Mid-Range)</h3>
            <p>بۆ کەمکردنەوەی لاگ لە Standoff 2</p>
            <button onclick="alert('لێرە ڕێنماییەکانی ئەندرۆید دادەنێیت')">بینینی ڕێکخستن</button>
        </div>
    </div>

</body>
</html>
