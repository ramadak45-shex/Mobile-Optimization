        function showGuide(text) {
            const box = document.getElementById('info-box');

        }

        function renderGames() {
            let input = document.getElementById('search').value.toUpperCase();
            let container = document.getElementById('game-list');
            container.innerHTML = "";
            games.filter(g => g.name.toUpperCase().includes(input)).forEach(g => {
                container.innerHTML += `<div class='card'><h3>${g.name}</h3><button onclick="showGuide('${g.guide}')">ڕێکخستن</button></div>`;
            });
        }
        renderGames();
